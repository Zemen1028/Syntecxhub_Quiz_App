<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabbed Section</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    padding: 50px 10px;
  }

  .tabs-container {
    width: 100%;
    max-width: 600px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    overflow: hidden;
  }


  .tabs {
    display: flex;
    background: #007bff;
  }

  .tab {
    flex: 1;
    padding: 15px;
    text-align: center;
    color: white;
    cursor: pointer;
    transition: background 0.3s;
  }

  .tab:hover {
    background: #0056b3;
  }

  .tab.active {
    background: #003f7f;
    font-weight: bold;
  }

  .content {
    padding: 20px;
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
  }

  .content.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 500px) {
    .tab {
      font-size: 14px;
      padding: 10px;
    }
  }
</style>
</head>

<body>

<div class="tabs-container">

  <div class="tabs">
    <div class="tab active" onclick="openTab(0)">Overview</div>
    <div class="tab" onclick="openTab(1)">Info</div>
    <div class="tab" onclick="openTab(2)">Contact</div>
  </div>

  <div class="content active">
    <h2>Overview</h2>
    <p>This is the overview section. It gives a general idea about the content.</p>
  </div>

  <div class="content">
    <h2>Info</h2>
    <p>This section contains detailed information about the topic.</p>
  </div>

  <div class="content">
    <h2>Contact</h2>
    <p>You can reach us at: example@email.com</p>
  </div>

</div>

<script>
  const tabs = document.querySelectorAll(".tab");
  const contents = document.querySelectorAll(".content");

  function openTab(index) {
    tabs.forEach(tab => tab.classList.remove("active"));
    contents.forEach(content => content.classList.remove("active"));

    tabs[index].classList.add("active");
    contents[index].classList.add("active");
  }
</script>

</body>
</html>
